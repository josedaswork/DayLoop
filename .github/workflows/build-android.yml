name: Build Android App

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    name: Build & Test Android Application
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Install dependencies
        run: npm ci || npm install

      - name: Build React Web App
        run: npm run build

      - name: Sync with Capacitor
        run: npx cap sync

      - name: Recreate Debug Keystore
        working-directory: android
        run: |
          if [ -f "debug.keystore.base64" ]; then
            echo "Recreating debug.keystore from base64..."
            base64 --decode debug.keystore.base64 > debug.keystore || base64 -d debug.keystore.base64 > debug.keystore || echo "Base64 decode failed"
          fi
          if [ ! -f "debug.keystore" ]; then
            echo "debug.keystore not found, generating a new fallback one with keytool..."
            keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
          fi

      - name: Copy App Logo to Android resources
        run: |
          mkdir -p android/app/src/main/res/drawable/
          if [ -f "Logo/logo_habit.png" ]; then
            cp Logo/logo_habit.png android/app/src/main/res/drawable/logo_habit.png
            echo "Logo successfully copied from root Logo folder!"
          fi

      - name: Regenerate Gradle Wrapper
        working-directory: android
        run: |
          if command -v gradle &> /dev/null; then
            echo "Using system gradle to regenerate wrapper..."
            gradle wrapper --gradle-version 8.14.3
          else
            echo "gradle command not found, downloading standard gradle-wrapper.jar..."
            mkdir -p gradle/wrapper
            curl -L -o gradle/wrapper/gradle-wrapper.jar https://raw.githubusercontent.com/gradle/gradle/v8.14.3/gradle/wrapper/gradle-wrapper.jar
          fi

      - name: Run Build and Compile APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Rename APK for Artifact Export
        run: |
          if [ -f "android/app/build/outputs/apk/debug/app-debug.apk" ]; then
            mv android/app/build/outputs/apk/debug/app-debug.apk android/app/build/outputs/apk/debug/Dayloop-Debug.apk
          else
            echo "app-debug.apk not found in default location, searching..."
            find android/app/build/outputs/ -name "*.apk"
          fi

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: Dayloop-Debug-APK
          path: android/app/build/outputs/apk/debug/Dayloop-Debug.apk


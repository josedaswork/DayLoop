name: Build Android App

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    name: Build & Test Android Application
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Set up External Environment Config
        run: |
          API_KEY="${{ secrets.GEMINI_API_KEY }}"
          if [ -z "$API_KEY" ]; then API_KEY="dummy_gemini_key"; fi
          URL="${{ secrets.APPS_SCRIPT_URL }}"
          if [ -z "$URL" ]; then URL="https://script.google.com/macros/s/dummy/exec"; fi
          echo "GEMINI_API_KEY=$API_KEY" > .env
          echo "APPS_SCRIPT_URL=$URL" >> .env


      - name: Initialize Gradle Wrapper (if missing)
        run: |
          if [ ! -f "gradlew" ]; then
            gradle wrapper
          fi
          chmod +x gradlew

      - name: Recreate Debug Keystore
        run: |
          if [ -f "debug.keystore.base64" ]; then
            echo "Recreating debug.keystore from base64..."
            base64 --decode debug.keystore.base64 > debug.keystore || base64 -d debug.keystore.base64 > debug.keystore || echo "Base64 decode failed"
          fi
          if [ ! -f "debug.keystore" ]; then
            echo "debug.keystore not found, generating a new fallback one with keytool..."
            keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
          fi

      - name: Run Build and Compile APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Rename APK for Artifact Export
        run: |
          if [ -f "app/build/outputs/apk/debug/app-debug.apk" ]; then
            mv app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/HobbyTracker-Debug.apk
          else
            echo "app-debug.apk not found in default location, searching..."
            find app/build/outputs/ -name "*.apk"
          fi

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: HobbyTracker-Debug-APK
          path: app/build/outputs/apk/debug/HobbyTracker-Debug.apk
